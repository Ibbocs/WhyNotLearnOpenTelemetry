receivers:
  otlp:
    protocols:
      grpc:
      http:

processors:
  batch:

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  elasticsearch:
    endpoints: [ "http://elasticsearch:9200" ]
    logs_index: "logs-generic-default"
  
  #  otlp: //new reic apm
  #    endpoint: https://otlp.eu01.nr-data.net:4318
  #    headers:
  #      api-key: "eu01xx97f7322ad415d93b0c930a40e8910aNRAL"

extensions:
  health_check:

service:
  extensions: [ health_check ]

  pipelines:
    traces:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ otlp/jaeger ]

    logs:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ elasticsearch ]
    
